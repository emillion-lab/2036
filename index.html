let lang='bg',yr=2026,co='bg',md='o',drg=false;

function bST(){let h='';PH.forEach(p=>{h+='<div class="tp" style="left:'+((p.a-2005)/31*100)+'%;width:'+((p.b-p.a+1)/31*100)+'%;background:'+p.bg+'"></div>'});$('TPH').innerHTML=h;$('TN').style.left=((2026-2005)/31*100)+'%';$('TX').innerHTML=[2005,2010,2015,2020,2026,2030,2036].map(y=>'<span>'+y+'</span>').join('')}

function bCH(){const W=620,H=140,pts=[];for(let y=2005;y<=2036;y++)pts.push({y,o:G$[y]||(GF[y]?GF[y].o:0),p:G$[y]||(GF[y]?GF[y].p:0),h:!!G$[y]});
const mx=Math.max(...pts.map(d=>d.o)),x=y=>((y-2005)/31)*W,yc=v=>H-10-v/mx*(H-20);
let s='<svg viewBox="0 0 '+W+' '+H+'">';PH.forEach(p=>{s+='<rect x="'+x(p.a)+'" width="'+(x(p.b+1)-x(p.a))+'" y="0" height="'+(H-10)+'" fill="'+p.bg+'" rx="2"/>'});

s+='<polygon points="'+pts.map(d=>x(d.y)+','+yc(d.o)).join(' ')+' '+W+','+(H-10)+' 0,'+(H-10)+'" fill="rgba(212,168,67,.15)"/>';
const hp=pts.filter(d=>d.h),fp=pts.filter(d=>!d.h||d.y===2026);
s+='<polyline points="'+hp.map(d=>x(d.y)+','+yc(d.o)).join(' ')+'" fill="none" stroke="#D4A843" stroke-width="2"/>';
s+='<polyline points="'+fp.map(d=>x(d.y)+','+yc(d.o)).join(' ')+'" fill="none" stroke="var(--gn)" stroke-width="1.5" stroke-dasharray="4,3"/>';
s+='<polyline points="'+fp.map(d=>x(d.y)+','+yc(d.p)).join(' ')+'" fill="none" stroke="var(--or)" stroke-width="1.5" stroke-dasharray="4,3"/>';
[2005,2010,2015,2020,2026,2030,2036].forEach(y=>{s+='<text x="'+x(y)+'" y="'+H+'" fill="#333" font-size="7" font-family="DM Sans" text-anchor="middle">'+y+'</text>'});

$('CH').innerHTML=s}

function uCH(){const W=620,H=140,mx=Math.max(...Object.values(G$),...Object.values(GF).map(f=>f.o));
const oz=gD(yr,md),cx=((yr-2005)/31)*W,cy=H-10-oz/mx*(H-20),mc=yr>2026?(md==='o'?'#4ade80':'#f97316'):'#D4A843';

function R(){
const c=CC[co],iF=yr>2026,gP=g1(yr,md),gP05=g1(2005,'o'),gEur=+(gP*FX.USD).toFixed(2);

const g1G05=gas05>0?+(loc05/gas05).toFixed(1):0,g1E05=elec05>0?Math.round(loc05/elec05):0,g1F05=food05>0?+(loc05/(food05/7)).toFixed(1):0;

const ph=PH.find(p=>yr>=p.a&&yr<=p.b)||PH[PH.length-1];

// Translate

$('BG').innerHTML=buys.map(x=>{const up=parseFloat(x.v)>=parseFloat(x.v0);return'<div class="bc"><div class="ic">'+x.i+'</div><div class="lb sf">'+x.l+'</div><div class="nm sf '+(up?'up':'dn')+'">'+x.v+'</div><div class="cm sf">2005: '+x.v0+' · '+(up?'×'+(x.v/x.v0).toFixed(1)+' '+t('mr'):'↓'+((1-x.v/x.v0)*100).toFixed(0)+'%')+'</div><div class="cm sf" style="color:#444;margin-top:2px">'+x.ex+'</div></div>'}).join('');

if(iF){db.style.display='grid';
db.innerHTML=[{m:'o',l:t('op'),cl:'#4ade80'},{m:'p',l:t('ps'),cl:'#f97316'}].map(sc=>{
const gx=g1(yr,sc.m),gex=+(gx*FX.USD).toFixed(2),lx=tL(gex,c.cur);

// Metrics

+'<div class="mt"><div class="ml sf">'+t('gt')+'</div><div class="mv sf" style="color:'+(mGr<mGr05?'var(--rd)':'var(--gn)')+'">'+mGr.toFixed(1)+'g</div><div class="ms sf">'+t('gwt')+' (€'+minE+')<br>'+t('gc')+' '+mGr.toFixed(1)+'g '+t('ga')+'<br>2005: '+mGr05.toFixed(1)+'g · '+(mGr<mGr05?'↓'+((1-mGr/mGr05)*100).toFixed(0)+'% '+t('gp'):t('gri'))+'</div></div>'
