function R(){

const mc=md==='o'?'#4ade80':'#f97316',pct=((yr-2005)/31)*100;

$('T').textContent=t('tl');$('S').textContent=t('sb');$('HT').textContent=t('ht');$('HX').textContent=t('hx');$('IQ').textContent=t('hq');

$('GS').textContent='$'+gP.toFixed(0)+'/g · ×'+(gP/gP05).toFixed(1)+' 2005';

$('H5').innerHTML=hrs05+'<span style="font-size:12px">'+t('hr')+'</span>';
$('HL').textContent=yr;$('HL').style.color=iF?mc:'#555';

$('SI').innerHTML=t('mn')+': €'+minE05+' → €'+minE+t('wm')+' · '+t('av')+': €'+avgE+t('wm')+' · '+t('ig')+': '+mGr05.toFixed(1)+'g → '+mGr.toFixed(1)+'g';

$('BT').innerHTML=t('bt')+' (€'+gEur+')';
const buys=[{i:'⛽',l:t('gl'),v:g1G,v0:g1G05,ex:t('tk')+(g1G>0?(50/g1G).toFixed(1):0)+'g'},{i:'⚡',l:t('kw'),v:g1E,v0:g1E05,ex:t('hh')},{i:'👨‍👩‍👧‍👦',l:t('ff'),v:g1F,v0:g1F05,ex:'('+Math.round(food)+' '+c.cur+'/'+t('wk')+')'}];

+'<div class="mt"><div class="ml sf">'+t('gt')+'</div><div class="mv sf" style="color:'+(mGr<mGr05?'var(--rd)':'var(--gn)')+'">'+mGr.toFixed(1)+'g</div><div class="ms sf">'+t('gwt')+' (€'+minE+')<br>'+t('gc')+' '+mGr.toFixed(1)+'g '+t('ga')+'<br>2005: '+mGr05.toFixed(1)+'g · '+(mGr<mGr05?'↓'+((1-mGr/mGr05)*100).toFixed(0)+'% '+t('gp'):t('gri'))+'</div></div>'
+'<div class="mt"><div class="ml sf">'+t('wt')+'</div><div class="mv sf" style="color:var(--bl)">'+wkF+'</div><div class="ms sf">'+t('we')+'<br>'+wkF+' '+t('wk')+(wkF>5?' ✅':wkF>3?' ⚠️':' ❌')+'</div></div>';

$('CYB').innerHTML=PH.map(p=>{const on=yr>=p.a&&yr<=p.b;return'<div class="cybb'+(on?' on':'')+'" data-yr="'+Math.round((p.a+p.b)/2)+'" style="flex:'+(p.b-p.a+1)+(on?';background:'+p.bg:'')+'"'+'><div class="cv sf">'+p.a+'</div><div class="ce">'+p.e+'</div></div>'}).join('');
document.querySelectorAll('.cybb').forEach(el=>{el.addEventListener('click',function(){yr=parseInt(this.dataset.yr);R();uCH()})});
